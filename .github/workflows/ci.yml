name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CapsLang.csproj

      - name: Build
        run: dotnet build CapsLang.csproj --configuration Release --no-restore

      - name: Build distributable assets
        shell: pwsh
        run: ./scripts/publish-release.ps1

      - name: Upload distributable assets
        uses: actions/upload-artifact@v4
        with:
          name: CapsLang-windows-assets
          path: artifacts/release/CapsLang-*
